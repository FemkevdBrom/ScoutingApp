name: CD - Deploy to Staging & Production

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/femkevdbrom/scoutingapp-backend:${{ github.sha }}
  FRONTEND_IMAGE: ghcr.io/femkevdbrom/scoutingapp-frontend:${{ github.sha }}

jobs:
  # ==================== 1. BUILD & TEST (CI-deel) ====================
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== FIX GRADLE PERMISSIONS ====================
      - name: Make Gradle executable
        working-directory: ./backend
        run: chmod +x ./gradlew

      # ==================== BACKEND: JAVA + GRADLE ====================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run Backend Tests
        working-directory: ./backend
        run: ./gradlew test --no-daemon

      - name: Build Backend with Gradle
        working-directory: ./backend
        run: ./gradlew build -x test --no-daemon

      # ==================== FRONTEND: REACT ====================
      - name: Run Frontend Tests
        working-directory: ./frontend
        run: |
          npm ci
          npm test -- --watchAll=false --ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      # ==================== DOCKER SETUP ====================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log into registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.REGISTRY }}/femkevdbrom/scoutingapp-backend,${{ env.REGISTRY }}/femkevdbrom/scoutingapp-frontend

      # ==================== BUILD & PUSH DOCKER IMAGES ====================
      - name: Build and push Backend Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 2. DEPLOY TO STAGING ====================
  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: staging
    if: success()

    steps:
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_STAGING }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/youruser/scoutingapp
            echo "TAG=${{ github.sha }}" > .env
            docker compose pull
            docker compose up -d --force-recreate
            echo "✅ Deployed to Staging: ${{ env.BACKEND_IMAGE }}"

  # ==================== 3. DEPLOY TO PRODUCTION ====================
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: ScoutingApp / production   # Dit triggert manual approval
    if: success()

    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_PROD }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/youruser/scoutingapp
            echo "TAG=${{ github.sha }}" > .env
            docker compose pull
            docker compose up -d --force-recreate
            echo "✅ Deployed to Production: ${{ env.BACKEND_IMAGE }}"