name: CD - Build & Deploy to Production

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]

env:
  BACKEND_IMAGE: ghcr.io/femkevdbrom/scoutingapp-backend:${{ github.sha }}

jobs:
  # ==================== 1. BUILD + TEST ====================
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== BACKEND ====================
      - name: Make Gradle executable
        working-directory: ./backend
        run: chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run Backend Tests
        working-directory: ./backend
        run: ./gradlew test --no-daemon

      - name: Build Backend
        working-directory: ./backend
        run: ./gradlew build -x test --no-daemon

      # ==================== FRONTEND ====================
      - name: Run Frontend Tests
        working-directory: ./frontend
        run: |
          npm ci
          npm test -- --watchAll=false --ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      # ==================== DOCKER BUILD & PUSH ====================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log into GHCR
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

  # ==================== 2. DEPLOY TO PRODUCTION ====================
  deploy-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: ScoutingApp / production
    if: success()

    steps:
      - uses: actions/checkout@v4

      # === Backend naar Railway ===
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend to Railway (Production)
        run: railway up --service="ScoutingAppBackend" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # === Frontend naar Vercel ===
      - name: Deploy Frontend to Vercel (Production)
        run: |
          npm install -g vercel
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}